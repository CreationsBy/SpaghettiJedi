<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Real-Time Fridge Magnets</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm"></audio>
    <audio id="sfx-place" src="place.mp3"></audio>
    <audio id="sfx-delete" src="delete.mp3"></audio>

    <div id="user-panel">
        <input type="text" id="username-input" placeholder="Enter Username" value="Anonymous">
        <button id="clear-my-items-btn">Clear My Items</button>
    </div>

    <canvas id="mini-map" width="200" height="200"></canvas>

    <div id="fridge-area">
        <div id="fridge-surface">
            <div class="fridge-handle"></div>
            <div id="label-container"></div>
        </div>
    </div>
    
    <div id="inventory-area">
        <button id="add-sticky" style="padding: 10px; font-weight: bold; cursor: pointer;">Add Sticky Note</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
